# ============================================================
# Data Sources Configuration
# ============================================================
# Binance Vision public kline data
# URL pattern: {base_url}/{symbol}/{timeframe}/{symbol}-{timeframe}-{date}.zip

binance:
  base_url: "https://data.binance.vision/data/futures/um/daily/klines"
  checksum_suffix: ".CHECKSUM"

# Symbols to download
symbols:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

# Timeframes to download (aligned with roadmap multi-TF requirements)
# Excluded 1m (too large for Phase 1), 3m, 30m, 2h, 6h, 8h, 12h, 3d, 1w, 1mo
timeframes:
  - 5m
  - 15m
  - 1h

# Base timeframe for model training
base_timeframe: "5m"

# Date range — last 1 year
# Set to null to auto-compute (today - 365 days)
date_range:
  start: null   # auto: 1 year ago
  end: null     # auto: yesterday

# Download settings
download:
  max_concurrent: 5          # parallel downloads
  retry_attempts: 3          # retries per file
  retry_delay_seconds: 2     # delay between retries
  timeout_seconds: 30        # per-request timeout
  verify_checksum: true      # validate SHA256

# Binance kline CSV columns (no header in files)
kline_columns:
  - open_time
  - open
  - high
  - low
  - close
  - volume
  - close_time
  - quote_volume
  - count
  - taker_buy_volume
  - taker_buy_quote_volume
  - ignore
